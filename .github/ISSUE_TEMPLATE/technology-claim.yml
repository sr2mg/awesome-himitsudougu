name: 技術対応の提案
description: ひみつ道具と現実の技術・製品・研究の対応を提案する
title: "[claim] "
labels:
  - technology-claim
body:
  - type: input
    id: gadget_name
    attributes:
      label: 対象の道具名
      description: 例: 石ころぼうし
    validations:
      required: true
  - type: input
    id: gadget_id
    attributes:
      label: 道具ID
      description: 分かる場合だけ入力してください。例: ishikoro-boshi。空なら _inbox に入ります。
    validations:
      required: false
  - type: dropdown
    id: status
    attributes:
      label: どのくらい実現していると思いますか？
      options:
        - できた
        - だいたいできた
        - 一部できた
        - 研究中
        - まだ
        - たぶん無理
        - 評価しない
    validations:
      required: true
  - type: dropdown
    id: confidence
    attributes:
      label: 自信
      options:
        - 高
        - 中
        - 低
    validations:
      required: true
  - type: input
    id: technology_name
    attributes:
      label: 近い技術・製品・研究
      description: 例: Google Translate, POCKETALK, adaptive camouflage
    validations:
      required: true
  - type: input
    id: technology_url
    attributes:
      label: 代表的な根拠URL
      description: 公式ページ、論文、企業発表、信頼できる記事など
    validations:
      required: false
  - type: textarea
    id: reason
    attributes:
      label: 理由
      description: 道具の中核機能と、現実技術が対応している点・足りない点を書いてください。
    validations:
      required: true
  - type: textarea
    id: evidence_urls
    attributes:
      label: 追加の根拠URL
      description: 複数ある場合は1行に1つずつ書いてください。
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: メモ
      description: 迷っている点や補足があれば書いてください。
    validations:
      required: false

